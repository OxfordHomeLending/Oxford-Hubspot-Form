<!-- ==========================================================================
     Oxford Home Lending lead form - Webflow embed
     1. Host the built /dist on GitHub Pages (see README).
     2. In Webflow, drop an "Embed" element where the form should appear.
     3. Paste everything below. Replace YOURNAME/REPO with your Pages URL.
     The small script listens for the form's height messages and resizes the
     iframe so there is never an inner scrollbar.
     ========================================================================== -->
<iframe
  id="ohl-lead-form"
  src="https://YOURNAME.github.io/REPO/"
  title="Get started with Oxford Home Lending"
  loading="lazy"
  scrolling="no"
  style="width:100%;border:0;display:block;min-height:680px;background:transparent"></iframe>

<script>
  (function () {
    var FORM_ORIGIN = 'https://YOURNAME.github.io'; // tighten this to your Pages origin
    var frame = document.getElementById('ohl-lead-form');
    window.addEventListener('message', function (e) {
      if (e.origin !== FORM_ORIGIN) return;                 // only trust our form
      if (!e.data || e.data.type !== 'ohl-form-height') return;
      if (typeof e.data.height === 'number' && e.data.height > 0) {
        frame.style.height = (e.data.height + 8) + 'px';
      }
    });
  })();
</script>
